<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apricot Genie</title>
  <link rel="stylesheet" href="style/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      background-color: #fcf4e7;
      margin: 0;
      padding: 0;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 130px;
    }
    .character {
      position: absolute;
      top: 199px;
      left: 50px;
      width: 486px;
      height: 486px;
    }
    .bubble {
      position: absolute;
      top: 272px;
      left: 472px;
      width: 623px;
      height: 228px;
      background-image: url("assets/images/Union.png");
      background-size: cover;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      box-sizing: border-box;
    }
    .bubble p {
      font-size: 20px;
      margin: 0;
      line-height: 1.6;
      color: #000;
    }
    .bubble b {
      font-weight: bold;
    }
    .btn-start {
      margin-top: 15px;
      padding: 15px 30px;
      background-color: #94ce81;
      border: none;
      border-radius: 20px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/images/logo.png" class="logo" alt="Apricot Labs logo" />
    <img src="assets/images/pose-1-calm.png" class="character" alt="Apricot character" />
    <div class="bubble">
      <p><b>ברוכים הבאים לאיזור שלי,</b><br />אני <b>April Cot</b> – ואני יודעת לנחש כל דמות,<br />רוצים לנסות אותי?</p>
      <button class="btn-start">LET’S GO!!!!!!!</button>
    </div>
  </div>
</body>
</html>
