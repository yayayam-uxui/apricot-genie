<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apricot Genie</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style/main.css" />
</head>
<body>
  <div id="screen-intro" class="screen">
    <header>
      <img src="assets/images/logo.png" alt="Apricot Labs logo" class="logo" />
    </header>

    <div class="content-wrapper">
      <img src="assets/images/pose-1-calm.png" alt="April Cot" class="character" />

      <div class="speech-wrapper">
        <img src="assets/images/Union.png" alt="bubble background" class="bubble-bg" />
        <div class="speech-text">
          <p><strong>ברוכים הבאים לאיזור שלי,</strong><br>
          אני <strong>April Cot</strong> – ואני יודעת לנחש כל דמות,<br>
          רוצים לנסות אותי?</p>
        </div>
        <button class="cta-btn" onclick="startGame()">LET’S GO!!!!!!!</button>
      </div>
    </div>
  </div>

  <script src="script/main.js"></script>
</body>
</html>
